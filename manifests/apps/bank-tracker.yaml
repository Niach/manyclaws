apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: bank-tracker-data
  namespace: friend-danny
spec:
  accessModes:
  - ReadWriteOnce
  resources:
    requests:
      storage: 500Mi
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: bank-tracker
  namespace: friend-danny
  labels:
    app: bank-tracker
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: bank-tracker
  template:
    metadata:
      labels:
        app: bank-tracker
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      containers:
      - name: bank-tracker
        image: bank-tracker:latest
        imagePullPolicy: Never
        ports:
        - containerPort: 3420
        env:
        - name: NODE_ENV
          value: production
        volumeMounts:
        - name: data
          mountPath: /app/data
        resources:
          requests:
            cpu: 50m
            memory: 64Mi
          limits:
            cpu: 500m
            memory: 256Mi
        securityContext:
          allowPrivilegeEscalation: false
          readOnlyRootFilesystem: true
          capabilities:
            drop:
            - ALL
        livenessProbe:
          httpGet:
            path: /
            port: 3420
          initialDelaySeconds: 10
          periodSeconds: 30
        readinessProbe:
          httpGet:
            path: /
            port: 3420
          initialDelaySeconds: 5
          periodSeconds: 10
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: bank-tracker-data
---
apiVersion: v1
kind: Service
metadata:
  name: bank-tracker
  namespace: friend-danny
spec:
  selector:
    app: bank-tracker
  ports:
  - port: 3420
    targetPort: 3420
