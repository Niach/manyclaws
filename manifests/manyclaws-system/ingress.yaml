# manyclaws.net → landing (Astro + Starlight static site)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: landing
  namespace: manyclaws-system
spec:
  entryPoints:
  - web
  routes:
  - match: Host(`manyclaws.net`)
    kind: Rule
    services:
    - name: landing
      port: 80
---
# admin.manyclaws.net → controller (cluster admin)
apiVersion: traefik.io/v1alpha1
kind: IngressRoute
metadata:
  name: cluster-admin
  namespace: manyclaws-system
spec:
  entryPoints:
  - web
  routes:
  - match: Host(`admin.manyclaws.net`)
    kind: Rule
    services:
    - name: manyclaws-controller
      port: 80
