apiVersion: v1
kind: ServiceAccount
metadata:
  name: agent-deployer
  namespace: agent-towelie
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: agent-namespace-admin
  namespace: agent-towelie
rules:
# Workload management
- apiGroups: ["apps"]
  resources: ["deployments", "replicasets", "statefulsets"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: ["batch"]
  resources: ["jobs", "cronjobs"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
# Core resources
- apiGroups: [""]
  resources: ["pods", "pods/log", "services", "configmaps", "persistentvolumeclaims"]
  verbs: ["get", "list", "watch", "create", "update", "patch", "delete"]
- apiGroups: [""]
  resources: ["pods/exec"]
  verbs: ["create"]
# Read-only access to secrets (controller manages creation)
- apiGroups: [""]
  resources: ["secrets"]
  verbs: ["get", "list", "watch"]
# Events for debugging
- apiGroups: [""]
  resources: ["events"]
  verbs: ["get", "list", "watch"]
# Resource quotas (read-only for self-awareness)
- apiGroups: [""]
  resources: ["resourcequotas", "limitranges"]
  verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: agent-deployer-binding
  namespace: agent-towelie
subjects:
- kind: ServiceAccount
  name: agent-deployer
  namespace: agent-towelie
roleRef:
  kind: Role
  name: agent-namespace-admin
  apiGroup: rbac.authorization.k8s.io
