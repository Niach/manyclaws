  # DISCORD_TOKEN: "YOUR_DISCORD_TOKEN_HERE"
  # CLOUDFLARE_API_TOKEN: "YOUR_CF_TOKEN_HERE"
  # GEMINI_API_KEY: "YOUR_GEMINI_KEY_HERE"
